# 创建/修改该文件的LLM大模型：Claude Sonnet 4.5 (via Arena.ai Agent Mode)
# 创建时间（北京时间，精确到秒）：2026-06-11 22:10:00 CST
#
# ============================================================================
# 数据源可信度清单（sources.yaml）—— debt-collection 项目
# 工作流（老板要点）：系统先充分调研给出此【初版】；项目运行中老板微调、共同维护。
#   - 老板只做"定性"：调 tier 等级、加 blacklist；权重由 tier 自动映射，老板不用算。
#   - tier_weights 为系统内置映射，一般不动。
# ⚠️ 数据源与数据质量是本项目命门，新增来源务必先评级再使用。
# ============================================================================

# 等级 → 权重 映射（系统量化，老板无需改）
tier_weights:
  official: 1.0      # 官方/法院/法规/政府平台（权威，可直接采信）
  professional: 0.8  # 律所实务/专业法律机构/权威媒体法律栏目
  media: 0.5         # 主流媒体一般报道
  self_media: 0.3    # 自媒体/论坛/知乎/贴吧（仅作线索，需交叉验证）
  blacklist: 0.0     # 老板拉黑的不可信来源（直接排除）

# ───────────────────────────────────────────────────────────────────────
# 官方权威数据源（official）—— 讨债核心数据，低风险公开渠道（对应取数 L1）
# ───────────────────────────────────────────────────────────────────────
sources:
  - name: 中国执行信息公开网
    url: http://zxgk.court.gov.cn/
    tier: official
    use_for: [失信被执行人, 限制高消费, 被执行人信息, 终本案件, 财产处置/司法拍卖]
    note: 查"对方是不是老赖/有没有被执行/有无可拍卖财产"的第一权威来源；取数 L1 首选。

  - name: 中国裁判文书网
    url: https://wenshu.court.gov.cn/
    tier: official
    use_for: [涉诉历史, 判决文书, 既往纠纷, 财产线索（文书中披露）]
    note: 查对方涉诉记录；需注册登录+可能验证码，走取数 L2(人在环)。注意同名辨别。

  - name: 国家企业信用信息公示系统(gsxt)
    url: https://www.gsxt.gov.cn/
    tier: official
    use_for: [工商登记, 股东结构, 对外投资, 经营异常, 行政处罚]
    note: 债务人若涉公司，查其股权/任职/经营状况；权威且免费。

  - name: 国家政务服务平台-信用信息查询
    url: https://www.gjzwfw.gov.cn/
    tier: official
    use_for: [企业信用综述, 行政管理, 诚实守信]
    note: 政府信用信息补充来源。

  - name: 人民法院诉讼资产网
    url: https://www.rmfysszc.gov.cn/
    tier: official
    use_for: [司法拍卖资产, 可执行财产变现]
    note: 评估对方名下可执行财产时参考。

  - name: 中国政府网/全国人大-法律法规库
    url: https://flk.npc.gov.cn/
    tier: official
    use_for: [民法典, 民事诉讼法, 诉讼时效, 司法解释]
    note: 法律条文以此为准，防止 LLM 法律幻觉；策略报告引用法条须回溯到这里。

# ───────────────────────────────────────────────────────────────────────
# 专业实务来源（professional）—— 实操经验，需交叉验证
# ───────────────────────────────────────────────────────────────────────
  - name: 最高人民法院/地方法院官方公众号与官网释法
    url: https://www.court.gov.cn/
    tier: professional
    use_for: [执行实务, 财产调查方法, 程序指引]
    note: 官方释法实务，可信度高。

  - name: 知名律所/律师实务文章（需具名、有执业信息）
    url: ""
    tier: professional
    use_for: [讨债策略, 诉讼/非诉实操, 调查令申请]
    note: 仅采信具名、有执业资质的律师实务；匿名/营销号降到 self_media。

# ───────────────────────────────────────────────────────────────────────
# 商业平台（按需，注意取数风险）
# ───────────────────────────────────────────────────────────────────────
  - name: 企查查/天眼查
    url: https://www.tianyancha.com/
    tier: professional
    use_for: [企业关联, 风险信息（辅助）]
    note: ⚠️ 强反爬+ToS禁爬，**不要用账号自动抓**；必要时走其官方API（取数建议见 data-acquisition-feasibility.md）。

# ───────────────────────────────────────────────────────────────────────
# 黑名单（老板维护）—— 拉黑的不可信来源，直接排除
# ───────────────────────────────────────────────────────────────────────
# 【系统第13轮审阅建议】以下为"应警惕/建议拉黑"的常见类型（老板按实际填具体名字）：
#   - "包打听/私家侦探"类承诺"查银行流水/开房记录/定位"的 → 多为非法获取个人信息，必拉黑且勿用
#   - "100%要回欠款/不成功不收费"的讨债营销号 → 夸大引流，内容不可信
#   - 卖"讨债课程/模板"的带货自媒体 → 夹带私货，降到 self_media 或拉黑
#   - 标题党"一招让老赖还钱"但无法条/案例支撑的 → 不可信
blacklist:
  # 示例（老板按实际把遇到的不可信来源填进来）：
  # - name: 某"专业讨债"公众号
  #   reason: 宣称能查银行流水/定位，涉嫌非法获取个人信息
  # - name: 某讨债带货博主
  #   reason: 夸大成功率、引流卖课，内容夹带私货
  []

# ───────────────────────────────────────────────────────────────────────
# 系统审阅建议（第13轮）——供老板微调参考
# ───────────────────────────────────────────────────────────────────────
review_suggestions:
  - "tier 等级建议保持：官方渠道(执行网/文书网/gsxt/法规库)=official 不要降，它们是讨债命门数据。"
  - "企查查/天眼查标 professional 但注明【走官方API、勿账号爬】，等级合理，重点是取数方式而非可信度。"
  - "知乎/公众号的律师实务文章：仅当【作者具名+有执业信息】才算 professional，否则归 self_media。"
  - "任何宣称能查【银行流水/通话记录/实时定位/开房记录】的来源 → 直接拉黑（涉嫌违法，且会害你担责）。"
  - "老板可补充：你本地/同行口碑里【明确踩过坑】的具体博主/机构，填进 blacklist。"
  - "新来源不确定等级时，先归 self_media + 要求多源交叉验证，验证可靠后再升级。"


# ───────────────────────────────────────────────────────────────────────
# 维护说明
# ───────────────────────────────────────────────────────────────────────
maintenance:
  owner: 老板（定性调整）+ 系统（调研补充）
  rule: 新增来源先评 tier 再用；不确定的先归 self_media 并要求交叉验证
  last_research: 2026-06-11  # 系统调研日期
