# 创建/修改该文件的LLM大模型：Claude Sonnet 4.5 (via Arena.ai Agent Mode)
# 创建时间（北京时间，精确到秒）：2026-06-13 09:15:00 CST

# _factory/experts/debt-lawyer.expert/expert.yaml
id: debt-lawyer
name: "债务律师专家"
version: "1.0.0"
description: "精通中国大陆债权债务法律法规、审判实务与执行流程的专业决策大脑。"

# 注意：这里必须是扁平的 primary，代码才能识别
role: primary 
model: local-qwen35b

# 将原本的嵌套属性合并到系统提示词中，Agent 能看懂
system_prompt: |
  你是一位资深债务诉讼律师/执行实务专家。
  你的专长：民间借贷纠纷、民事执行实务（财产查控/终本应对）、债权保护。
  你的风格：严谨、务实、方案导向、警惕红线。
  你的输出要求：结构化报告，含法律依据、执行概率预判与话术建议。

# 路由配置（代码会读取这里的 model）
routing:
  primary_reasoning: "local-qwen35b"
  execution_logic: "local-qwen35b"
  fallback: "cloud/glm-primary"

knowledge_config:
  rag_strategy: "multi-vector-retrieval"
  source_priority:
    - "Statutes"
    - "Practical_QA"
    - "Execution_Intel"

usage:
  - "为 debt-collection 项目提供高价值博弈策略"
  - "对复杂债务关系进行法律定性"
  - "指导合法取数与财产保全路径"
