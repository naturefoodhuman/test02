# 创建/修改该文件的LLM大模型：Claude Sonnet 4.5 (via Arena.ai Agent Mode)
# 创建时间（北京时间，精确到秒）：2026-06-10 23:03:36 CST

model_list:
  - model_name: "local/primary"
    litellm_params:
      model: "ollama/qwen3.6:35b-a3b-q8_0"
      api_base: "http://localhost:11434"
      timeout: 300
    model_info:
      cost_per_token: 0

  - model_name: "local/fallback"
    litellm_params:
      model: "ollama/qwen3:14b"
      api_base: "http://localhost:11434"
      timeout: 120
    model_info:
      cost_per_token: 0

  - model_name: "local/coder"
    litellm_params:
      model: "ollama/qwen3-coder-next:q4_K_M"
      api_base: "http://localhost:11434"
      timeout: 300
    model_info:
      cost_per_token: 0

  - model_name: "local/embedding"
    litellm_params:
      model: "ollama/bge-m3:latest"
      api_base: "http://localhost:11434"
      timeout: 120
    model_info:
      mode: embedding
      cost_per_token: 0

  - model_name: "cloud/glm-primary"
    litellm_params:
      model: "openai/z-ai/glm-5.1"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: "os.environ/GLM_API_KEY"
      timeout: 60
      stream_timeout: 30
      drop_params: true
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  - model_name: "cloud/gpt-5.5"
    litellm_params:
      model: "openai/gpt-5.5"
      api_base: "https://aiapiv2.pekpik.com/v1"
      api_key: "os.environ/PEKPIK_API_KEY"
      timeout: 120
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  - model_name: "cloud/deepseek-r1"
    litellm_params:
      model: "openai/deepseek-ai/DeepSeek-R1"
      api_base: "https://api.siliconflow.cn/v1"
      api_key: "os.environ/DEEPSEEK_API_KEY"
      timeout: 300
      stream_timeout: 60
    model_info:
      input_cost_per_token: 0.0000005
      output_cost_per_token: 0.00000218

  - model_name: "cloud/glm-debug"
    litellm_params:
      model: "openai/ZhipuAI/GLM-5"
      api_base: "https://api-inference.modelscope.cn/v1"
      api_key: "os.environ/GLM_API_KEY"
      timeout: 60
      stream_timeout: 20
      drop_params: true
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

router_settings:
  routing_strategy: "latency-based-routing"
  fallbacks:
    - "cloud/glm-primary": ["local/primary", "local/fallback"]
    - "local/primary": ["local/fallback"]
  enable_pre_call_checks: true
  num_retries: 2
  retry_after: 5

litellm_settings:
  json_logs: true
