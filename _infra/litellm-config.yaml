# 创建/修改该文件的LLM大模型：Claude Sonnet 4.5 (via Arena.ai Agent Mode)
# 创建时间：2026-06-13 15:35:00

model_list:
  # ═══════════ LOCAL REASONING（DeepSeek-R1 32B 本地版）═══════════
  # 老板已通过 ollama run deepseek-r1:32b 拉取。
  - model_name: "local/r1"
    litellm_params:
      model: "ollama/deepseek-r1:32b"
      api_base: "http://localhost:11434"
      timeout: 300
    model_info:
      cost_per_token: 0

  # ═══════════ LOCAL PRIMARY（Qwen 本地主力）═══════════
  - model_name: "local/primary"
    litellm_params:
      model: "ollama/qwen3.6:35b-a3b-q8_0"
      api_base: "http://localhost:11434"
      timeout: 300
    model_info:
      cost_per_token: 0

  # ═══════════ LOCAL EMBEDDING（向量检索）═══════════
  - model_name: "local/embedding"
    litellm_params:
      model: "ollama/bge-m3:latest"
      api_base: "http://localhost:11434"
      timeout: 120
    model_info:
      mode: embedding
      cost_per_token: 0

  # ═══════════ CLOUD GPT-5.5（Pekpik 渠道）═══════════
  - model_name: "cloud/gpt-5.5"
    litellm_params:
      model: "openai/gpt-5.5"
      api_base: "https://aiapiv2.pekpik.com/v1"
      api_key: "os.environ/PEKPIK_API_KEY"
      timeout: 120

  # ═══════════ CLOUD R1（SiliconFlow 备份）═══════════
  - model_name: "cloud/deepseek-r1"
    litellm_params:
      model: "openai/deepseek-ai/DeepSeek-R1"
      api_base: "https://api.siliconflow.cn/v1"
      api_key: "os.environ/DEEPSEEK_API_KEY"
      timeout: 300

  # ═══════════ CLOUD GLM（原云端主力）═══════════
  - model_name: "cloud/glm-primary"
    litellm_params:
      model: "openai/z-ai/glm-5.1"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: "os.environ/GLM_API_KEY"
      timeout: 60

router_settings:
  routing_strategy: "latency-based-routing"
  fallbacks:
    - "local/r1": ["cloud/deepseek-r1", "local/primary"]
    - "cloud/glm-primary": ["local/primary"]

litellm_settings:
  json_logs: true
